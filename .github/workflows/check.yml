name: NixOS Config Check

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Evaluate and build NixOS config
        run: nix flake check && nix build .#nixosConfigurations.server.config.system.build.toplevel --no-link
